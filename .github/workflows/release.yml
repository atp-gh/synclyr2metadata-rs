name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: synclyr2metadata-rs
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ runner.os }}-${{ env.RELEASE_TAG }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ runner.os }}-${{ env.RELEASE_TAG }}-
            release-cargo-${{ runner.os }}-

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Release tag: ${RELEASE_TAG}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
          else
            echo "Release ${RELEASE_TAG} does not exist. Creating it..."
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "Release ${RELEASE_TAG}"
          fi

      - name: Build all targets
        shell: bash
        run: |
          set -euo pipefail

          targets=(
            "x86_64-unknown-linux-musl:x86_64-unknown-linux-musl:"
            "x86_64-pc-windows-gnu:x86_64-pc-windows-gnu:.exe"
          )

          mkdir -p dist

          for item in "${targets[@]}"; do
            IFS=":" read -r name target binary_ext <<< "${item}"

            echo "========================================"
            echo "Building ${name}"
            echo "Target: ${target}"
            echo "========================================"

            cross build --release --locked --target "${target}"

            package_name="${BIN_NAME}-${RELEASE_TAG}-${name}"
            out_dir="dist/${package_name}"

            mkdir -p "${out_dir}"

            cp "target/${target}/release/${BIN_NAME}${binary_ext}" "${out_dir}/"

            if [[ "${binary_ext}" == ".exe" ]]; then
              (
                cd dist
                zip -r "${package_name}.zip" "${package_name}"
              )
            else
              (
                cd dist
                tar -czf "${package_name}.tar.gz" "${package_name}"
              )
            fi

            rm -rf "${out_dir}"
          done

          echo "Generated assets:"
          ls -lah dist

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(dist/*.tar.gz dist/*.zip)

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found."
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
